# ============================================================================
# Cables (97 routed)
# ============================================================================

# -- Core → Dist: 4 (red) ---------------------------------------------------
[[cables]]
src = ["core1.d1", "core1.d2", "core2.d1", "core2.d2"]
dst = ["dist1.u1", "dist2.u1", "dist1.u2", "dist2.u2"]
style = "core"

# -- Core → Svc: 4 (red) ----------------------------------------------------
[[cables]]
src = ["core1.d3", "core1.d4", "core2.d3", "core2.d4"]
dst = ["svc1.u1",  "svc2.u1",  "svc1.u2",  "svc2.u2"]
style = "core"

# -- Core → Mgmt uplink: 2 (red) --------------------------------------------
[[cables]]
src = ["core1.d5", "core2.d5"]
dst = ["mgmt1.u1", "mgmt2.u1"]
style = "core"

# -- Core → Server PCIe2: 4 (red) -------------------------------------------
[[cables]]
src = ["core1.d6", "core2.d6", "core1.d7", "core2.d7"]
dst = ["srv1.p2a", "srv2.p2a", "srv3.p2a", "srv4.p2a"]
style = "core"

# -- Core → VM Host PCIe2: 2 (red) ------------------------------------------
[[cables]]
src = ["core1.d8", "core2.d8"]
dst = ["vmh1.p2a", "vmh2.p2a"]
style = "core"

# -- Dist → Access: 8 (blue, dual-homed) ------------------------------------
[[cables]]
src = ["dist1.d1", "dist1.d2", "dist1.d3", "dist1.d4",
       "dist2.d1", "dist2.d2", "dist2.d3", "dist2.d4"]
dst = ["acc1.u1",  "acc2.u1",  "acc3.u1",  "acc4.u1",
       "acc1.u2",  "acc2.u2",  "acc3.u2",  "acc4.u2"]
style = "acc"

# -- Dist → Server PCIe2: 4 (blue) ------------------------------------------
[[cables]]
src = ["dist1.d5", "dist2.d5", "dist1.d6", "dist2.d6"]
dst = ["srv1.p2b", "srv2.p2b", "srv3.p2b", "srv4.p2b"]
style = "acc"

# -- Dist → VM Host PCIe1: 2 (blue) -----------------------------------------
[[cables]]
src = ["dist1.d7", "dist2.d7"]
dst = ["vmh2.p1b", "vmh3.p2b"]
style = "acc"

# -- Svc → Storage iSCSI: 6 (orange) ----------------------------------------
[[cables]]
src = ["svc1.d1", "svc1.d2", "svc1.d3", "svc2.d1", "svc2.d2", "svc2.d3"]
dst = ["stor1.e0a", "stor2.e0a", "stor3.e0a", "stor1.e0b", "stor2.e0b", "stor3.e0b"]
style = "svc"

# -- Svc → Storage NFS: 6 (orange) ------------------------------------------
[[cables]]
src = ["svc1.d4", "svc1.d5", "svc1.d6", "svc2.d4", "svc2.d5", "svc2.d6"]
dst = ["stor1.e1a", "stor2.e1a", "stor3.e1a", "stor1.e1b", "stor2.e1b", "stor3.e1b"]
style = "svc"

# -- Svc → Server OCP: 8 (green) --------------------------------------------
[[cables]]
src = ["svc1.d7",  "svc2.d7",  "svc1.d8",  "svc2.d8",
       "svc1.d9",  "svc2.d9",  "svc1.d10", "svc2.d10"]
dst = ["srv1.ocp1", "srv1.ocp2", "srv2.ocp1", "srv2.ocp2",
       "srv3.ocp1", "srv3.ocp2", "srv4.ocp1", "srv4.ocp2"]
style = "data"

# -- Svc → Server PCIe1: 8 (green) ------------------------------------------
[[cables]]
src = ["svc1.d11", "svc2.d11", "svc1.d12", "svc2.d12",
       "svc1.d13", "svc2.d13", "svc1.d14", "svc2.d14"]
dst = ["srv1.p1a", "srv1.p1b", "srv2.p1a", "srv2.p1b",
       "srv3.p1a", "srv3.p1b", "srv4.p1a", "srv4.p1b"]
style = "data"

# -- Svc → VM Host OCP: 4 (teal) --------------------------------------------
[[cables]]
src = ["svc1.d15", "svc2.d15", "svc1.d16", "svc2.d16"]
dst = ["vmh1.ocp1", "vmh1.ocp2", "vmh2.ocp1", "vmh2.ocp2"]
style = "vm"

# -- Svc → VM Host OCP + PCIe: 5 (teal) -------------------------------------
[[cables]]
src = ["svc1.d17", "svc2.d17", "svc1.d18", "svc2.d18", "svc1.d19"]
dst = ["vmh3.ocp1", "vmh3.ocp2", "vmh1.p3a", "vmh2.p3a", "vmh3.p3a"]
style = "vm"

# -- Access → Auth NIC1: 4 (blue) -------------------------------------------
[[cables]]
src = ["acc1.d1", "acc2.d1", "acc3.d1", "acc4.d1"]
dst = ["auth1.eth1", "auth1.eth2", "auth2.eth1", "auth2.eth2"]
style = "acc"

# -- Access → VM Host PCIe1: 4 (teal) ---------------------------------------
[[cables]]
src = ["acc1.d2", "acc2.d2", "acc3.d2", "acc4.d2"]
dst = ["vmh1.p1a", "vmh2.p1a", "vmh3.p1a", "vmh3.p1b"]
style = "vm"

# -- Access → Auth NIC2: 4 (green) ------------------------------------------
[[cables]]
src = ["acc1.d3", "acc2.d3", "acc3.d3", "acc4.d3"]
dst = ["auth1.eth3", "auth1.eth4", "auth2.eth3", "auth2.eth4"]
style = "data"

# -- Mgmt1 → Storage OOB: 3 (purple dotted) ---------------------------------
[[cables]]
src = ["mgmt1.d1", "mgmt1.d2", "mgmt1.d3"]
dst = ["stor1.m1",  "stor2.m1",  "stor3.m1"]
style = "mgmt"

# -- Mgmt1 → Server iDRAC: 4 (purple dotted) --------------------------------
[[cables]]
src = ["mgmt1.d4", "mgmt1.d5", "mgmt1.d6", "mgmt1.d7"]
dst = ["srv1.mgmt", "srv2.mgmt", "srv3.mgmt", "srv4.mgmt"]
style = "mgmt"

# -- Mgmt1 → Auth iDRAC: 1 (purple dotted) ----------------------------------
[[cables]]
src = "mgmt1.d8"
dst = "auth1.mgmt"
style = "mgmt"

# -- Mgmt2 → VM Host iDRAC: 3 (purple dotted) -------------------------------
[[cables]]
src = ["mgmt2.d1", "mgmt2.d2", "mgmt2.d3"]
dst = ["vmh1.mgmt", "vmh2.mgmt", "vmh3.mgmt"]
style = "mgmt"

# -- Mgmt2 → Auth iDRAC: 1 (purple dotted) ----------------------------------
[[cables]]
src = "mgmt2.d4"
dst = "auth2.mgmt"
style = "mgmt"

# -- Mgmt2 → VM Host PCIe3: 3 (purple dotted) -------------------------------
[[cables]]
src = ["mgmt2.d5", "mgmt2.d6", "mgmt2.d7"]
dst = ["vmh1.p3b",  "vmh2.p3b",  "vmh3.p3b"]
style = "mgmt"

# -- Mgmt2 → VM Host backup: 1 (purple dotted) ------------------------------
[[cables]]
src = "mgmt2.d8"
dst = "vmh3.p2a"
style = "mgmt"

# -- Svc → VM Host PCIe remaining: 2 (teal) ---------------------------------
[[cables]]
src = ["svc1.d21", "svc2.d21"]
dst = ["vmh1.p2b", "vmh2.p2b"]
style = "vm"

