# ============================================================================
# Cables (97 routed)
# ============================================================================

# -- Core1 → Dist: 1系 (red) ------------------------------------------------
[[cables]]
src = ["core1.d1", "core1.d2"]
dst = ["dist1.u1", "dist2.u1"]
style = "core"

# -- Core2 → Dist: 2系 (red_lt) --------------------------------------------
[[cables]]
src = ["core2.d1", "core2.d2"]
dst = ["dist1.u2", "dist2.u2"]
style = "core2"

# -- Core1 → Svc: 1系 (red) ------------------------------------------------
[[cables]]
src = ["core1.d3", "core1.d4"]
dst = ["svc1.u1",  "svc2.u1"]
style = "core"

# -- Core2 → Svc: 2系 (red_lt) ---------------------------------------------
[[cables]]
src = ["core2.d3", "core2.d4"]
dst = ["svc1.u2",  "svc2.u2"]
style = "core2"

# -- Core → Mgmt uplink: 1系 (red) -----------------------------------------
[[cables]]
src = "core1.d5"
dst = "mgmt1.u1"
style = "core"

# -- Core → Mgmt uplink: 2系 (red_lt) --------------------------------------
[[cables]]
src = "core2.d5"
dst = "mgmt2.u1"
style = "core2"

# -- Core1 → Server PCIe2: 1系 (red) ---------------------------------------
[[cables]]
src = ["core1.d6", "core1.d7"]
dst = ["srv1.p2a", "srv3.p2a"]
style = "core"

# -- Core2 → Server PCIe2: 2系 (red_lt) ------------------------------------
[[cables]]
src = ["core2.d6", "core2.d7"]
dst = ["srv2.p2a", "srv4.p2a"]
style = "core2"

# -- Core → VM Host PCIe2: 1系 (red) ---------------------------------------
[[cables]]
src = "core1.d8"
dst = "vmh1.p2a"
style = "core"

# -- Core → VM Host PCIe2: 2系 (red_lt) ------------------------------------
[[cables]]
src = "core2.d8"
dst = "vmh2.p2a"
style = "core2"

# -- Dist1 → Access: 1系 (blue) --------------------------------------------
[[cables]]
src = ["dist1.d1", "dist1.d2", "dist1.d3", "dist1.d4"]
dst = ["acc1.u1",  "acc2.u1",  "acc3.u1",  "acc4.u1"]
style = "acc"

# -- Dist2 → Access: 2系 (blue_lt) -----------------------------------------
[[cables]]
src = ["dist2.d1", "dist2.d2", "dist2.d3", "dist2.d4"]
dst = ["acc1.u2",  "acc2.u2",  "acc3.u2",  "acc4.u2"]
style = "acc2"

# -- Dist1 → Server PCIe2: 1系 (blue) --------------------------------------
[[cables]]
src = ["dist1.d5", "dist1.d6"]
dst = ["srv1.p2b", "srv3.p2b"]
style = "acc"

# -- Dist2 → Server PCIe2: 2系 (blue_lt) -----------------------------------
[[cables]]
src = ["dist2.d5", "dist2.d6"]
dst = ["srv2.p2b", "srv4.p2b"]
style = "acc2"

# -- Dist → VM Host PCIe1: 1系 (blue) --------------------------------------
[[cables]]
src = "dist1.d7"
dst = "vmh2.p1b"
style = "acc"

# -- Dist → VM Host PCIe1: 2系 (blue_lt) -----------------------------------
[[cables]]
src = "dist2.d7"
dst = "vmh3.p2b"
style = "acc2"

# -- Svc1 → Storage iSCSI: 1系 (orange) ------------------------------------
[[cables]]
src = ["svc1.d1", "svc1.d2", "svc1.d3"]
dst = ["stor1.e0a", "stor2.e0a", "stor3.e0a"]
style = "svc"

# -- Svc2 → Storage iSCSI: 2系 (orange_lt) ---------------------------------
[[cables]]
src = ["svc2.d1", "svc2.d2", "svc2.d3"]
dst = ["stor1.e0b", "stor2.e0b", "stor3.e0b"]
style = "svc2"

# -- Svc1 → Storage NFS: 1系 (orange) --------------------------------------
[[cables]]
src = ["svc1.d4", "svc1.d5", "svc1.d6"]
dst = ["stor1.e1a", "stor2.e1a", "stor3.e1a"]
style = "svc"

# -- Svc2 → Storage NFS: 2系 (orange_lt) -----------------------------------
[[cables]]
src = ["svc2.d4", "svc2.d5", "svc2.d6"]
dst = ["stor1.e1b", "stor2.e1b", "stor3.e1b"]
style = "svc2"

# -- Svc1 → Server OCP: 1系 (green) ----------------------------------------
[[cables]]
src = ["svc1.d7", "svc1.d8", "svc1.d9", "svc1.d10"]
dst = ["srv1.ocp1", "srv2.ocp1", "srv3.ocp1", "srv4.ocp1"]
style = "data"

# -- Svc2 → Server OCP: 2系 (green_lt) -------------------------------------
[[cables]]
src = ["svc2.d7", "svc2.d8", "svc2.d9", "svc2.d10"]
dst = ["srv1.ocp2", "srv2.ocp2", "srv3.ocp2", "srv4.ocp2"]
style = "data2"

# -- Svc1 → Server PCIe1: 1系 (green) --------------------------------------
[[cables]]
src = ["svc1.d11", "svc1.d12", "svc1.d13", "svc1.d14"]
dst = ["srv1.p1a", "srv2.p1a", "srv3.p1a", "srv4.p1a"]
style = "data"

# -- Svc2 → Server PCIe1: 2系 (green_lt) -----------------------------------
[[cables]]
src = ["svc2.d11", "svc2.d12", "svc2.d13", "svc2.d14"]
dst = ["srv1.p1b", "srv2.p1b", "srv3.p1b", "srv4.p1b"]
style = "data2"

# -- Svc1 → VM Host OCP: 1系 (teal) ----------------------------------------
[[cables]]
src = ["svc1.d15", "svc1.d16"]
dst = ["vmh1.ocp1", "vmh2.ocp1"]
style = "vm"

# -- Svc2 → VM Host OCP: 2系 (teal_lt) -------------------------------------
[[cables]]
src = ["svc2.d15", "svc2.d16"]
dst = ["vmh1.ocp2", "vmh2.ocp2"]
style = "vm2"

# -- Svc1 → VM Host OCP + PCIe: 1系 (teal) ---------------------------------
[[cables]]
