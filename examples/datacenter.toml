# datacenter.toml — 24 devices, 100 cables (97 routed + 3 StackWise)
#
# Generate:  python3 tools/toml2drawio.py examples/datacenter.toml

[settings]
router = "obstacle"
layer_gap = 220
device_gap = 25
cable_layers = true

# ============================================================================
# Edge styles
# ============================================================================
[edge_styles]
core   = { color = "red",       width = 3 }
core2  = { color = "red_lt",    width = 3 }
acc    = { color = "blue",      width = 2 }
acc2   = { color = "blue_lt",   width = 2 }
svc    = { color = "orange",    width = 2 }
svc2   = { color = "orange_lt", width = 2 }
data   = { color = "green",     width = 2 }
data2  = { color = "green_lt",  width = 2 }
vm     = { color = "teal",      width = 2 }
vm2    = { color = "teal_lt",   width = 2 }
mgmt   = { color = "purple",    width = 1.5, line = "dotted" }
mgmt2  = { color = "purple_lt", width = 1.5, line = "dotted" }
stack  = { color = "gray",      width = 2,   line = "dashed" }

# ============================================================================
# Port styles
# ============================================================================
[port_styles]
up   = { color = "red" }
down = { color = "blue" }
srv  = { color = "green" }
mgmt = { color = "gray" }

# ============================================================================
# Layer 0: Core switches (2)
# ============================================================================
[[devices]]
id = "core1"
label = "Core-SW-1"
layer = 0
style = "purple"
ports = [
    { name = "u1", style = "up" },
    { name = "u2", style = "up" },
    { name = "d1", style = "down" },
    { name = "d2", style = "down" },
    { name = "d3", style = "down" },
    { name = "d4", style = "down" },
    { name = "d5", style = "down" },
    { name = "d6", style = "down" },
    { name = "d7", style = "down" },
    { name = "d8", style = "down" },
]

[[devices]]
id = "core2"
label = "Core-SW-2"
layer = 0
style = "purple"
ports = [
    { name = "u1", style = "up" },
    { name = "u2", style = "up" },
    { name = "d1", style = "down" },
    { name = "d2", style = "down" },
    { name = "d3", style = "down" },
    { name = "d4", style = "down" },
    { name = "d5", style = "down" },
    { name = "d6", style = "down" },
    { name = "d7", style = "down" },
    { name = "d8", style = "down" },
]

