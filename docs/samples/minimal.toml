# minimal.toml — 最小構成の配線図サンプル
#
# スイッチ2台 + サーバ1台、ケーブル2本
# まずはこれをコピーして動かしてみてください。
#
# 生成コマンド:
#   python3 tools/toml2drawio.py docs/samples/minimal.toml

# ============================================================================
# 1. 全体設定
# ============================================================================
[settings]
router = "obstacle"          # ケーブル経路の自動計算方式

# ============================================================================
# 2. エッジスタイル（ケーブルの見た目）を定義
#    color: 色名（red/blue/green/orange/cyan/purple/gray など16色）
#    width: 線の太さ
#    line:  線種（省略で実線。"dotted"/"dashed" など）
# ============================================================================
[edge_styles]
data = { color = "blue", width = 2 }
mgmt = { color = "purple", width = 1.5, line = "dotted" }

# ============================================================================
# 3. ポートスタイル（ポートの色）を定義
#    color: 色名
# ============================================================================
[port_styles]
up   = { color = "red" }
down = { color = "blue" }
srv  = { color = "green" }
mgmt = { color = "gray" }

# ============================================================================
# 4. デバイス定義
#
#    ■ Flat デバイス（スイッチ等）:
#      ports = [{ name = "ポート名", style = "ポートスタイル名" }, ...]
#
#    ■ id はケーブル定義で使う識別子。ラベルとは別。
#    ■ layer = 0 が最上段、1 が次の段、2 が…と下に並ぶ。
#    ■ style は背景色: "yellow" / "green" / "purple" / "red" / "blue" / "gray"
# ============================================================================

# --- スイッチ（Flat: ポート横1列）---
[[devices]]
id = "sw1"
label = "Switch-1"
layer = 0
style = "yellow"
ports = [
    { name = "d1", style = "down" },
    { name = "d2", style = "down" },
]

[[devices]]
id = "sw2"
label = "Switch-2"
layer = 0
style = "yellow"
ports = [
    { name = "d1", style = "down" },
]

# --- サーバ（Carded: カード → ポートの2段構造）---
#
#   [[devices.cards]]      ← カード（NIC等）
#     name = "カード名"
#     ports = [...]        ← そのカードのポート
#
[[devices]]
id = "srv1"
label = "Server-1"
layer = 1
style = "blue"
[[devices.cards]]
name = "NIC1"
ports = [
    { name = "eth1", style = "srv" },
    { name = "eth2", style = "srv" },
]
[[devices.cards]]
name = "BMC"
ports = [
    { name = "mgmt", style = "mgmt" },
]

# ============================================================================
# 5. ケーブル定義
#
#    src = "デバイスID.ポート名"
#    dst = "デバイスID.ポート名"
#    style = "エッジスタイル名"
#
#    ★重要: ポート名はデバイス定義の name と完全一致させること！
# ============================================================================

[[cables]]
src = "sw1.d1"
dst = "srv1.eth1"
style = "data"

[[cables]]
src = "sw2.d1"
dst = "srv1.mgmt"
style = "mgmt"

# ============================================================================
# 6. 凡例（図の右上に表示される色の説明）
# ============================================================================
[[legend]]
label = "Data"
style = "data"

[[legend]]
label = "Management"
style = "mgmt"
